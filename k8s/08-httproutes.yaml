apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wms-route
  namespace: wms
spec:
  parentRefs:
    - name: wms-gateway
      namespace: wms
  rules:
    # 🔹 Health check → Backend
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: backend
          port: 80

    # 🔹 API traffic → Backend
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: 80

    # 🔹 Uploads → Backend
    - matches:
        - path:
            type: PathPrefix
            value: /uploads
      backendRefs:
        - name: backend
          port: 80

    # 🔹 Everything else → Frontend
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
